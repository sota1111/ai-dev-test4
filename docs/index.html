<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeQuest Ops Demo</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #00d2ff;
            --accent: #2dd4bf;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --road: #334155;
            --building: #1e293b;
            --green: #064e3b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Phone Frame */
        .phone-frame {
            width: 320px;
            height: 640px;
            border: 8px solid #334155;
            border-radius: 36px;
            overflow: hidden;
            position: relative;
            background-color: #000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .phone-inner {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
        }

        /* Top HUD */
        .hud-bar {
            height: 40px;
            background-color: rgba(15, 23, 42, 0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            font-size: 12px;
            font-weight: bold;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hud-left {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .player-icon {
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }

        .hud-center {
            color: var(--primary);
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hud-right {
            color: #fbbf24;
        }

        /* Map Area */
        .map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: var(--green);
        }

        .map-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 100%;
            height: 100%;
        }

        .cell {
            border: 0.1px solid rgba(255, 255, 255, 0.05);
        }

        .cell.road { background-color: var(--road); }
        .cell.building { background-color: var(--building); }

        .player-marker {
            position: absolute;
            width: 32px;
            height: 32px;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 4s linear;
            z-index: 5;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .quest-marker {
            position: absolute;
            width: 24px;
            height: 24px;
            font-size: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .quest-marker.visible {
            opacity: 1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary)); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 10px var(--primary)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary)); }
        }

        .quest-marker.cleared::after {
            content: '✅';
            position: absolute;
            font-size: 14px;
            top: -5px;
            right: -5px;
        }

        /* Quest Card */
        .quest-card {
            height: 40%;
            background-color: var(--card);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.3);
            z-index: 10;
            transform: translateY(0);
            transition: transform 0.5s ease-out;
        }

        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .quest-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
        }

        .quest-status {
            font-size: 12px;
            color: var(--accent);
            background: rgba(45, 212, 191, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .quest-description {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.4;
            min-height: 40px;
        }

        .progress-container {
            margin-top: auto;
            margin-bottom: 10px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
            color: var(--text-dim);
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.5s linear;
        }

        .celebration {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
        }

        .celebration.active {
            animation: burst 1s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        /* Scanning effect */
        .scanning .progress-bar-fill {
            animation: scan 1.5s infinite;
            width: 30% !important;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(333%); }
        }

    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="phone-inner">
            <!-- HUD -->
            <div class="hud-bar">
                <div class="hud-left">
                    <div class="player-icon">🏃</div>
                    <span>Explorer Lv.3</span>
                </div>
                <div class="hud-center" id="hud-quest-name">探索中...</div>
                <div class="hud-right" id="hud-score">0 pts</div>
            </div>

            <!-- Map -->
            <div class="map-container" id="map">
                <div class="map-grid" id="grid"></div>
                <div class="player-marker" id="player">🏃</div>
                <div class="quest-marker" id="quest-marker">📌</div>
                <div class="celebration" id="celebration">🎉</div>
            </div>

            <!-- Quest Card -->
            <div class="quest-card" id="quest-card">
                <div class="quest-header">
                    <div class="quest-title" id="quest-title">🔍 クエスト探索中...</div>
                    <div class="quest-status" id="quest-status">READY</div>
                </div>
                <div class="quest-description" id="quest-desc">
                    周辺の歴史的スポットを探しています...
                </div>
                <div class="progress-container">
                    <div class="progress-labels">
                        <span id="progress-left">進捗</span>
                        <span id="progress-right">0%</span>
                    </div>
                    <div class="progress-bar-bg" id="progress-bar-container">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const quests = [
            { id: 1, name: "明治の名残", task: "赤レンガの記憶を探せ", fact: "この建物は1905年に建てられました", pos: { top: 20, left: 70 } },
            { id: 2, name: "江戸の痕跡", task: "石畳の記憶を辿れ", fact: "この石畳は江戸時代から続く古道です", pos: { top: 60, left: 20 } },
            { id: 3, name: "戦後の再生", task: "復興の象徴を撮れ", fact: "1952年、この建物は戦後復興のシンボルとして建設されました", pos: { top: 40, left: 50 } },
        ];

        const stateDurations = [5000, 5000, 3000, 4000]; // Exploring, Found, Arrived, Clear
        let currentQuestIndex = 0;
        let currentState = 0;
        let score = 0;
        let distance = 150;

        // Initialize Map Grid
        const grid = document.getElementById('grid');
        const pattern = [
            'BBRRRRRGGG',
            'BBRRRRRGGG',
            'RRRRBBBRRR',
            'GGGRRRRRRR',
            'GGGRRRBBBR',
            'RRRRRRBBBR',
            'RRRRRRRRRR',
            'BBRRRGGGRR',
            'BBRRRGGGRR',
            'RRRRRRRRRR'
        ];

        for (let r = 0; r < 10; r++) {
            for (let c = 0; c < 10; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const type = pattern[r][c];
                if (type === 'R') cell.classList.add('road');
                if (type === 'B') cell.classList.add('building');
                grid.appendChild(cell);
            }
        }

        const player = document.getElementById('player');
        const qMarker = document.getElementById('quest-marker');
        const hudQuestName = document.getElementById('hud-quest-name');
        const hudScore = document.getElementById('hud-score');
        const qTitle = document.getElementById('quest-title');
        const qStatus = document.getElementById('quest-status');
        const qDesc = document.getElementById('quest-desc');
        const pBarFill = document.getElementById('progress-bar-fill');
        const pRight = document.getElementById('progress-right');
        const pBarContainer = document.getElementById('progress-bar-container');
        const celebration = document.getElementById('celebration');

        function updateState() {
            const quest = quests[currentQuestIndex];
            
            switch(currentState) {
                case 0: // Exploring
                    hudQuestName.textContent = "探索中...";
                    qTitle.textContent = "🔍 クエスト探索中...";
                    qStatus.textContent = "SEARCHING";
                    qDesc.textContent = "周辺の歴史的スポットを探しています...";
                    pBarFill.style.width = "0%";
                    pRight.textContent = "0%";
                    pBarContainer.classList.remove('scanning');
                    qMarker.classList.remove('visible', 'cleared');
                    // Move player to a random road-ish position
                    player.style.top = "80%";
                    player.style.left = "10%";
                    break;

                case 1: // Quest Found
                    hudQuestName.textContent = quest.name;
                    qTitle.textContent = "📜 Quest #" + quest.id + ": " + quest.name;
                    qStatus.textContent = "ACTIVE";
                    qDesc.textContent = quest.task;
                    qMarker.style.top = quest.pos.top + "%";
                    qMarker.style.left = quest.pos.left + "%";
                    qMarker.classList.add('visible');
                    
                    // Move player towards quest
                    player.style.top = quest.pos.top + "%";
                    player.style.left = quest.pos.left + "%";

                    // Distance countdown
                    distance = 150;
                    const distInterval = setInterval(() => {
                        distance -= 30;
                        if (distance <= 0) {
                            distance = 0;
                            clearInterval(distInterval);
                        }
                        qStatus.textContent = "📍 あと " + distance + "m";
                        const progress = Math.min(100, Math.round(((150 - distance) / 150) * 100));
                        pBarFill.style.width = progress + "%";
                        pRight.textContent = progress + "%";
                    }, 1000);
                    break;

                case 2: // Arrived
                    qTitle.textContent = "📍 目的地に到着！";
                    qStatus.textContent = "SCANNING";
                    qDesc.textContent = "写真を解析中... 🔄";
                    pBarContainer.classList.add('scanning');
                    break;

                case 3: // Clear
                    qTitle.textContent = "✅ クエスト達成！";
                    qStatus.textContent = "COMPLETE";
                    qDesc.textContent = "✨ " + quest.fact;
                    pBarContainer.classList.remove('scanning');
                    pBarFill.style.width = "100%";
                    pRight.textContent = "100%";
                    qMarker.classList.add('cleared');
                    
                    // Score update
                    score += 100;
                    hudScore.textContent = score + " pts";
                    hudScore.style.transform = "scale(1.2)";
                    setTimeout(() => hudScore.style.transform = "scale(1)", 500);

                    // Burst
                    celebration.classList.add('active');
                    setTimeout(() => celebration.classList.remove('active'), 1000);
                    break;
            }

            setTimeout(nextState, stateDurations[currentState]);
        }

        function nextState() {
            currentState++;
            if (currentState > 3) {
                currentState = 0;
                currentQuestIndex = (currentQuestIndex + 1) % quests.length;
            }
            updateState();
        }

        // Start the loop
        updateState();

    </script>
</body>
</html>
